<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NISA分析">
  <meta name="theme-color" content="#BF0000">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <title>{% block title %}NISA分析ツール{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.x/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="/static/css/app.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rakuten: { DEFAULT: '#BF0000', light: '#E53E3E', dark: '#8B0000' }
          }
        }
      }
    }
  </script>

  <script>
    // Alpine.js グローバルストア（比較選択状態）
    document.addEventListener('alpine:init', () => {
      Alpine.store('compare', {
        ids: JSON.parse(localStorage.getItem('compareIds') || '[]'),
        toggle(id) {
          if (this.ids.includes(id)) {
            this.ids = this.ids.filter(i => i !== id)
          } else if (this.ids.length < 4) {
            this.ids = [...this.ids, id]
          }
          localStorage.setItem('compareIds', JSON.stringify(this.ids))
        },
        has(id) { return this.ids.includes(id) },
        clear() {
          this.ids = []
          localStorage.setItem('compareIds', JSON.stringify([]))
        },
        get count() { return this.ids.length }
      })
    })

    // PWA Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/js/sw.js')
      })
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-safe" x-data>

  <!-- メインコンテンツ -->
  <main class="pb-20">
    {% block content %}{% endblock %}
  </main>

  <!-- ボトムナビゲーション -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 nav-safe-bottom">
    <div class="flex">
      <a href="/"
         class="flex-1 flex flex-col items-center py-2 pt-3 min-h-[56px] {% if request.url.path == '/' %}text-rakuten{% else %}text-gray-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <span class="text-xs mt-0.5 font-medium">商品一覧</span>
      </a>

      <a href="/compare"
         class="flex-1 flex flex-col items-center py-2 pt-3 min-h-[56px] relative {% if request.url.path == '/compare' %}text-rakuten{% else %}text-gray-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs mt-0.5 font-medium">比較</span>
        <!-- バッジ -->
        <span x-show="$store.compare.count > 0"
              x-text="$store.compare.count"
              class="absolute top-1 right-4 bg-rakuten text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
        </span>
      </a>

      <a href="/allowance"
         class="flex-1 flex flex-col items-center py-2 pt-3 min-h-[56px] {% if request.url.path == '/allowance' %}text-rakuten{% else %}text-gray-500{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span class="text-xs mt-0.5 font-medium">残枠管理</span>
      </a>
    </div>
  </nav>

</body>
</html>
