{% extends "base.html" %}
{% block title %}商品一覧 | NISA分析ツール{% endblock %}
{% block content %}

<div x-data="fundList()" x-init="init()" class="max-w-2xl mx-auto">

  <!-- ヘッダー -->
  <div class="bg-white sticky top-0 z-40 shadow-sm">
    <div class="px-4 pt-4 pb-2">
      <h1 class="text-xl font-bold text-gray-900">NISA商品一覧</h1>
      <p class="text-xs text-gray-500 mt-0.5">楽天証券 対応ファンド（新NISA）</p>
    </div>

    <!-- 検索バー -->
    <div class="px-4 pb-2">
      <div class="relative">
        <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchFunds()"
               placeholder="ファンド名・運用会社を検索"
               class="w-full pl-9 pr-4 py-2.5 bg-gray-100 rounded-xl text-base border-none focus:ring-2 focus:ring-rakuten outline-none">
      </div>
    </div>

    <!-- フィルターボタン -->
    <div class="px-4 pb-3 flex gap-2 overflow-x-auto scrollbar-hide">
      <button @click="showFilter = !showFilter"
              class="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap"
              :class="hasActiveFilter ? 'bg-rakuten text-white' : 'bg-gray-100 text-gray-700'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
        </svg>
        フィルター
        <span x-show="hasActiveFilter" class="bg-white text-rakuten rounded-full w-4 h-4 text-xs flex items-center justify-center font-bold" x-text="activeFilterCount"></span>
      </button>

      <!-- クイックフィルター -->
      <button @click="toggleQuick('nisa_type', 'tsumitate')"
              class="px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap"
              :class="filters.nisa_type === 'tsumitate' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'">
        つみたて投資枠
      </button>
      <button @click="toggleQuick('nisa_type', 'seichou')"
              class="px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap"
              :class="filters.nisa_type === 'seichou' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'">
        成長投資枠
      </button>
    </div>
  </div>

  <!-- フィルターパネル（スライドダウン） -->
  <div x-show="showFilter" x-transition class="bg-white border-b border-gray-100 px-4 py-4 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1">カテゴリ</label>
        <select x-model="filters.category" @change="fetchFunds()"
                class="w-full text-sm border border-gray-200 rounded-lg py-2 px-3 bg-white">
          <option value="">すべて</option>
          <option value="global_equity">全世界株式</option>
          <option value="foreign_equity">外国株式</option>
          <option value="domestic_equity">国内株式</option>
          <option value="domestic_bond">国内債券</option>
          <option value="foreign_bond">外国債券</option>
          <option value="balanced">バランス</option>
          <option value="reit">REIT</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1">NISA枠</label>
        <select x-model="filters.nisa_type" @change="fetchFunds()"
                class="w-full text-sm border border-gray-200 rounded-lg py-2 px-3 bg-white">
          <option value="">すべて</option>
          <option value="tsumitate">つみたて投資枠</option>
          <option value="seichou">成長投資枠</option>
        </select>
      </div>
    </div>
    <div>
      <label class="text-xs font-semibold text-gray-600 block mb-1">
        信託報酬上限: <span class="text-rakuten font-bold" x-text="filters.max_expense + '%'"></span>
      </label>
      <input type="range" x-model="filters.max_expense" @input="fetchFunds()"
             min="0.05" max="1.0" step="0.01"
             class="w-full accent-rakuten">
      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>0.05%</span><span>1.00%</span>
      </div>
    </div>
    <button @click="resetFilters()"
            class="text-sm text-gray-500 underline">フィルターをリセット</button>
  </div>

  <!-- 件数表示 -->
  <div class="px-4 py-2 flex items-center justify-between">
    <p class="text-sm text-gray-500">
      <span x-text="funds.length" class="font-semibold text-gray-800"></span> 件
    </p>
    <p class="text-xs text-gray-400">信託報酬が低い順</p>
  </div>

  <!-- ファンドカード一覧 -->
  <div class="px-4 space-y-3 pb-4">
    <template x-if="loading">
      <div class="text-center py-12 text-gray-400">読み込み中...</div>
    </template>

    <template x-if="!loading && funds.length === 0">
      <div class="text-center py-12 text-gray-400">
        <svg class="w-12 h-12 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p>条件に合うファンドがありません</p>
      </div>
    </template>

    <template x-for="fund in funds" :key="fund.id">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 active:scale-98 transition-transform">

        <!-- ヘッダー行 -->
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <p class="text-[11px] text-gray-400 font-medium" x-text="fund.fund_company"></p>
            <h3 class="text-sm font-bold text-gray-900 leading-tight mt-0.5" x-text="fund.short_name"></h3>
          </div>
          <!-- 比較チェック -->
          <button @click="$store.compare.toggle(fund.id)"
                  class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center border-2 transition-colors"
                  :class="$store.compare.has(fund.id) ? 'bg-rakuten border-rakuten' : 'border-gray-300 bg-white'"
                  :title="$store.compare.has(fund.id) ? '比較から削除' : '比較に追加'">
            <svg class="w-4 h-4" :class="$store.compare.has(fund.id) ? 'text-white' : 'text-gray-400'"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
          </button>
        </div>

        <!-- バッジ行 -->
        <div class="flex flex-wrap gap-1.5 mt-2.5">
          <span class="px-2 py-0.5 rounded-full text-[11px] font-medium"
                :class="categoryBadge(fund.category)">
            <span x-text="fund.category_label"></span>
          </span>
          <span class="px-2 py-0.5 rounded-full text-[11px] font-medium"
                :class="nisaBadge(fund.nisa_type)">
            <span x-text="fund.nisa_type_label"></span>
          </span>
          <span x-show="fund.is_rakuten_card_eligible"
                class="px-2 py-0.5 rounded-full text-[11px] font-medium bg-orange-50 text-orange-700">
            カード積立対応
          </span>
        </div>

        <!-- 数値行 -->
        <div class="mt-3 grid grid-cols-3 gap-2 text-center">
          <div>
            <p class="text-[10px] text-gray-400 mb-0.5">信託報酬</p>
            <p class="font-bold text-sm" :class="expenseColor(fund.expense_ratio)"
               x-text="fund.expense_ratio.toFixed(4) + '%'"></p>
          </div>
          <div>
            <p class="text-[10px] text-gray-400 mb-0.5">リスク</p>
            <div class="flex justify-center gap-0.5">
              <template x-for="i in 5">
                <div class="w-2.5 h-2.5 rounded-full" :class="i <= fund.risk_level ? riskColor(fund.risk_level) : 'bg-gray-200'"></div>
              </template>
            </div>
          </div>
          <div>
            <p class="text-[10px] text-gray-400 mb-0.5">純資産</p>
            <p class="font-semibold text-sm text-gray-800"
               x-text="fund.net_assets_billion_jpy ? fund.net_assets_billion_jpy.toLocaleString('ja-JP') + '億' : '-'"></p>
          </div>
        </div>

        <!-- 説明（折りたたみ） -->
        <details class="mt-2">
          <summary class="text-xs text-gray-400 cursor-pointer select-none">詳細を見る</summary>
          <p class="text-xs text-gray-600 mt-1.5 leading-relaxed" x-text="fund.description"></p>
        </details>

      </div>
    </template>
  </div>

  <!-- 比較フローティングボタン -->
  <div x-show="$store.compare.count > 0"
       x-transition
       class="fixed bottom-20 inset-x-4 z-50">
    <a :href="'/compare?ids=' + $store.compare.ids.join(',')"
       class="flex items-center justify-between bg-rakuten text-white rounded-2xl px-5 py-3.5 shadow-xl">
      <span class="font-bold">
        <span x-text="$store.compare.count"></span>本を比較する
      </span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

</div>

<script>
function fundList() {
  return {
    funds: [],
    loading: true,
    searchQuery: '',
    showFilter: false,
    filters: {
      category: '',
      nisa_type: '',
      max_expense: 1.0,
    },

    get hasActiveFilter() {
      return this.filters.category || this.filters.nisa_type || this.filters.max_expense < 1.0
    },
    get activeFilterCount() {
      let c = 0
      if (this.filters.category) c++
      if (this.filters.nisa_type) c++
      if (this.filters.max_expense < 1.0) c++
      return c
    },

    async init() {
      await this.fetchFunds()
    },

    async fetchFunds() {
      this.loading = true
      const params = new URLSearchParams()
      if (this.searchQuery) params.set('q', this.searchQuery)
      if (this.filters.category) params.set('category', this.filters.category)
      if (this.filters.nisa_type) params.set('nisa_type', this.filters.nisa_type)
      if (this.filters.max_expense < 1.0) params.set('max_expense', this.filters.max_expense)

      try {
        const res = await fetch('/api/products?' + params.toString())
        this.funds = await res.json()
      } finally {
        this.loading = false
      }
    },

    toggleQuick(key, value) {
      this.filters[key] = this.filters[key] === value ? '' : value
      this.fetchFunds()
    },

    resetFilters() {
      this.filters = { category: '', nisa_type: '', max_expense: 1.0 }
      this.searchQuery = ''
      this.fetchFunds()
    },

    categoryBadge(cat) {
      const m = {
        global_equity: 'bg-blue-50 text-blue-700',
        foreign_equity: 'bg-indigo-50 text-indigo-700',
        domestic_equity: 'bg-teal-50 text-teal-700',
        domestic_bond: 'bg-gray-100 text-gray-700',
        foreign_bond: 'bg-slate-100 text-slate-700',
        balanced: 'bg-purple-50 text-purple-700',
        reit: 'bg-amber-50 text-amber-700',
      }
      return m[cat] || 'bg-gray-100 text-gray-700'
    },

    nisaBadge(t) {
      if (t === 'tsumitate') return 'bg-blue-100 text-blue-800'
      if (t === 'seichou') return 'bg-green-100 text-green-800'
      return 'bg-violet-100 text-violet-800'
    },

    expenseColor(ratio) {
      if (ratio < 0.1) return 'text-green-600'
      if (ratio < 0.2) return 'text-amber-600'
      return 'text-red-500'
    },

    riskColor(level) {
      if (level <= 2) return 'bg-green-500'
      if (level === 3) return 'bg-yellow-400'
      return 'bg-red-500'
    },
  }
}
</script>
{% endblock %}
